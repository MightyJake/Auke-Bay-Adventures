# netlify.toml — Auke Bay Adventures site configuration

[build]
  functions = "netlify/functions"
  publish   = "."

[context.production]
  environment = { NODE_VERSION = "18" }

# CLOUDINARY_CLOUD_NAME is a public identifier, not a sensitive secret.
# The actual secrets (API key/secret) live in environment variables only.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "CLOUDINARY_CLOUD_NAME"

# Custom Identity email templates
[identity]
  [identity.emails]
    invitation = "netlify/email-templates/invite.html"
    recovery   = "netlify/email-templates/recovery.html"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200